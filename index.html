<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ドリンク販売設定画面</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        /* 全体の背景：空のような明るい水色から薄い黄色へのグラデーション */
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Arial Black', sans-serif;
            background: linear-gradient(135deg, #fff9c4, #b3e5fc);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
        }

        /* コンテナ：角丸で、おもちゃ箱のような温かい雰囲気 */
        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 35px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 100%;
            max-width: 500px;
            border: 6px solid #ffeb3b;
            /* 明るい黄色の縁取り */
        }

        h1 {
            color: #f57c00;
            font-size: 32px;
            margin: 5px 0;
            text-shadow: 1px 1px #fff;
        }

        /* 楽しいボタン：クリックしたくなる立体感 */
        .btn {
            cursor: pointer;
            border: none;
            font-weight: bold;
            border-radius: 50px;
            padding: 20px;
            width: 100%;
            font-size: 24px;
            color: white;
            box-shadow: 0 8px #d84315;
            transition: transform 0.1s;
        }

        #saveBtn {
            margin-top: 20px;
            width: 100%;
            padding: 15px;
            font-size: 20px;
            background: #4CAF50;
            box-shadow: 0 6px #2E7D32;
        }

        #saveBtn:active {
            transform: translateY(3px);
            box-shadow: 0 3px #2E7D32;
        }

        /* チェックリスト：水色ベースで整理されたデザイン */
        .checkbox-list {
            text-align: left;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 25px;
            border: 3px solid #b3e5fc;
        }

        /* チェックリスト：設定 */
        .checkbox-setting {
            text-align: left;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            background: #e1f5fe;
            padding: 15px;
            border-radius: 25px;
            border: 3px solid #b3e5fc;
        }

        .item-label {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: #ffffff;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            color: #0277bd;
            font-weight: bold;
        }

        .item-label input {
            accent-color: #03a9f4;
            transform: scale(1.6);
            margin-right: 15px;
        }


        .section-title {
            text-align: left;
            font-size: 32px;
            color: #555;
            margin: 20px 0 10px;
        }

        .title-divider {
            border: 0;
            height: 3px;
            background: linear-gradient(to right, #81D4FA, #4FC3F7, #81D4FA);
            border-radius: 3px;
            margin: 20px 0 25px;
        }

        /* ローディング画面 */
        #loading {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            z-index: 9999;

            justify-content: center;
            align-items: center;
        }

        /* クルクル */
        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid #E3F2FD;
            border-top: 8px solid #2196F3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #counterTable {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 18px;
        }

        #counterTable th {
            background: #2196F3;
            color: white;
            padding: 10px;
        }

        #counterTable td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        #counterTable tbody tr:nth-child(even) {
            background: #f7f7f7;
        }

        #counterTable tfoot {
            background: #FFF3CD;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<div id="loading">
    <div class="spinner"></div>
</div>

<body>
    <div class="container">
        <br />
        <label style="font-weight: bold; color: #555; cursor: pointer; font-size: 32px;">
            横浜南陵高校
            <br />
            ドリンク販売設定画面
        </label>
        <hr class="title-divider">
        <h2 class="section-title">ペットボトル</h2>
        <div id="checkbox-list-drink" class="checkbox-list"></div>
        <h2 class="section-title">ゼリー</h2>
        <div id="checkbox-list-jelly" class="checkbox-list"></div>

        <div class="checkbox-setting">
            <label class="item-label">
                <input type="checkbox" id="sound-off-checkbox" checked style="margin-right: 10px;" />
                SOUND OFF
            </label>
            <label class="item-label">

                <span>リトライ間隔</span>
                <span style="margin-left: 15px; transform: scale(0.8);">
                    <input type="number" id="retrySpan" size="2"
                        style="width: 50px; padding: 3px; text-align: center;" />
                    秒後
                </span>
            </label>
            <label class="item-label">
                <input type="checkbox" id="ooatari" checked style="margin-right: 10px;" />
                <span>大当たり</span>
                <span style="margin-left: 15px; transform: scale(0.8);">
                    <input type="number" id="ooatariPercent" value="10" min="0" max="100" size="2"
                        style="width: 50px; padding: 3px; text-align: center;" />
                    %
                </span>
            </label>
            <label class="item-label">
                <input type="checkbox" id="omake" checked style="margin-right: 10px;" />
                <span>おまけ</span>
                <span style="margin-left: 15px; transform: scale(0.8);">
                    <input type="number" id="omakePercent" value="20" min="0" max="100" size="2"
                        style="width: 50px; padding: 3px; text-align: center;" />
                    %
                </span>
            </label>
        </div>
        <div class="save-button">
            <button id="saveBtn" class="btn" style="margin-top:20px;">設定</button>
        </div>

        <table id="counterTable">
            <thead>
                <tr>
                    <th>日付</th>
                    <th>大当たり</th>
                    <th>おまけ</th>
                    <th>合計</th>
                </tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr>
                    <th>総合計</th>
                    <th id="totalOoatari">0</th>
                    <th id="totalOmake">0</th>
                    <th id="grandTotal">0</th>
                </tr>
            </tfoot>
        </table>
    </div>

    <script>
        let drinkAllItems = [];
        let jellyAllItems = [];

        $(function () {

            showLoading();

            $.getJSON(
                "https://slot-nanryo-default-rtdb.firebaseio.com/config.json",
                function (config) {

                    drinkAllItems = config.drinkItems;
                    jellyAllItems = config.jellyItems;

                    $("#checkbox-list-drink").empty();
                    $("#checkbox-list-jelly").empty();

                    config.drinkItems.forEach(function (item) {
                        const checked =
                            config.drinkEnabledItems && config.drinkEnabledItems.includes(item)
                                ? "checked"
                                : "";
                        $("#checkbox-list-drink").append(`
                      <label class="item-label">
                          <input type="checkbox"
                              value="${item}"
                              ${checked}>
                          ${item}
                      </label>
                  `);

                    });
                    config.jellyItems.forEach(function (item) {
                        const checked =
                            config.jellyEnabledItems && config.jellyEnabledItems.includes(item)
                                ? "checked"
                                : "";
                        $("#checkbox-list-jelly").append(`
                      <label class="item-label">
                          <input type="checkbox"
                              value="${item}"
                              ${checked}>
                          ${item}
                      </label>
                  `);
                    });
                    $("#sound-off-checkbox").prop("checked", config.soundOff);
                    $("#retrySpan").val(config.retrySpan);
                    $("#ooatari").prop("checked", config.ooatari);
                    $("#ooatariPercent").val(config.ooatariPercent);
                    $("#omake").prop("checked", config.omake);
                    $("#omakePercent").val(config.omakePercent);
                }
            ).always(function () {
                hideLoading();
            });

            //あたりのカウントを取得する
            loadCounter();

        });

        $("#saveBtn").click(function () {

            retrySpan = Number($("#retrySpan").val());
            ooatariPercent = Number($("#ooatariPercent").val());
            omakePercent = Number($("#omakePercent").val());

            if (typeof retrySpan !== 'number' || retrySpan < 0) {
                alert("リトライ間隔は数字を指定してください。");
                return;
            }
            if (typeof ooatariPercent !== 'number' || ooatariPercent % 1 !== 0 || ooatariPercent < 0) {
                alert("大当たりの％は整数を指定してください。");
                return;
            }
            if (typeof omakePercent !== 'number' || omakePercent % 1 !== 0 || omakePercent < 0) {
                alert("おまけの％は整数を指定してください。");
                return;
            }


            const drinkEnabledItems = [];
            const jellyEnabledItems = [];

            $("#checkbox-list-drink input:checked").each(function () {
                drinkEnabledItems.push($(this).val());
            });
            $("#checkbox-list-jelly input:checked").each(function () {
                jellyEnabledItems.push($(this).val());
            });

            const config = {
                drinkItems: drinkAllItems,
                drinkEnabledItems: drinkEnabledItems,
                jellyItems: jellyAllItems,
                jellyEnabledItems: jellyEnabledItems,
                soundOff: $("#sound-off-checkbox").prop("checked"),
                retrySpan: Number($("#retrySpan").val()),
                ooatari: $("#ooatari").prop("checked"),
                ooatariPercent: Number($("#ooatariPercent").val()),
                omake: $("#omake").prop("checked"),
                omakePercent: Number($("#omakePercent").val()),

            };
            $.ajax({
                url: "https://slot-nanryo-default-rtdb.firebaseio.com/config.json",
                type: "PUT",
                contentType: "application/json",
                data: JSON.stringify(config),
                success: function () {
                    alert("設定を保存しました");
                },
                error: function () {
                    alert("保存に失敗しました");
                }
            });

        });
        function showLoading() {
            $("#loading").css("display", "flex");
        }

        function hideLoading() {
            $("#loading").hide();
        }

        function loadCounter() {

            $.getJSON(
                "https://slot-nanryo-default-rtdb.firebaseio.com/counter.json",
                function (data) {

                    const tbody = $("#counterTable tbody");
                    tbody.empty();

                    let totalOoatari = 0;
                    let totalOmake = 0;
                    let rowCount = 0;

                    // 表示する日付
                    const targetDates = [
                        // "2026-07-12",
                        "2026-09-10",
                        "2026-09-11",
                        "2026-09-12"
                    ];
                    // 新しい日付順
                    targetDates.reverse().forEach(date => {

                        if (!data || !data[date]) {
                            return;
                        }

                        const oo = data[date].ooatari || 0;
                        const om = data[date].omake || 0;

                        // 当選が0件なら表示しない
                        if (oo === 0 && om === 0) {
                            return;
                        }

                        totalOoatari += oo;
                        totalOmake += om;
                        rowCount++;

                        tbody.append(`
                    <tr>
                        <td>${date}</td>
                        <td>${oo}</td>
                        <td>${om}</td>
                        <td>${oo + om}</td>
                    </tr>
                `);
                    });

                    // 合計
                    $("#totalOoatari").text(totalOoatari);
                    $("#totalOmake").text(totalOmake);
                    $("#grandTotal").text(totalOoatari + totalOmake);

                    // 1件も表示するデータがなければテーブルを非表示
                    if (rowCount === 0) {
                        $("#counterTable").hide();
                    } else {
                        $("#counterTable").show();
                    }

                }
            );
        }
    </script>
</body>

</html>
